<?xml version="1.0" encoding="UTF-8"?>
<!-- 低保真原型线框图模板 -->
<!-- 使用说明：复制此文件并重命名，在Figma/Sketch/AI中打开编辑 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <style>
    .wireframe { fill: none; stroke: #333; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
    .label { font-family: Arial, sans-serif; font-size: 10px; fill: #999; }
    .component { fill: #f5f5f5; stroke: #333; stroke-width: 1.5; }
    .button { fill: #e0e0e0; stroke: #333; stroke-width: 1.5; rx: 4; }
  </style>
  
  <!-- 页面框架 -->
  <rect x="0" y="0" width="375" height="812" class="wireframe"/>
  
  <!-- Header / 导航栏 -->
  <rect x="0" y="0" width="375" height="60" class="component"/>
  <text x="20" y="35" class="text">页面标题</text>
  <rect x="310" y="20" width="45" height="20" class="button"/>
  <text x="318" y="34" class="label">菜单</text>
  
  <!-- Tab 导航 -->
  <rect x="0" y="752" width="375" height="60" class="component"/>
  <rect x="0" y="752" width="94" height="4" fill="#333"/>
  <text x="47" y="792" class="label" text-anchor="middle">首页</text>
  <text x="141" y="792" class="label" text-anchor="middle">发现</text>
  <text x="235" y="792" class="label" text-anchor="middle">消息</text>
  <text x="329" y="792" class="label" text-anchor="middle">我的</text>
  
  <!-- 内容区域占位符 -->
  <rect x="20" y="80" width="335" height="120" class="component" rx="8"/>
  <text x="187" y="145" class="label" text-anchor="middle">轮播图 / Banner</text>
  
  <!-- 列表项 x3 -->
  <rect x="20" y="220" width="335" height="80" class="component" rx="8"/>
  <text x="45" y="250" class="label">列表项 1</text>
  <rect x="45" y="265" width="100" height="20" class="button"/>
  <rect x="280" y="260" width="50" height="40" class="component"/>
  
  <rect x="20" y="315" width="335" height="80" class="component" rx="8"/>
  <text x="45" y="345" class="label">列表项 2</text>
  <rect x="45" y="360" width="100" height="20" class="button"/>
  <rect x="280" y="355" width="50" height="40" class="component"/>
  
  <rect x="20" y="410" width="335" height="80" class="component" rx="8"/>
  <text x="45" y="440" class="label">列表项 3</text>
  <rect x="45" y="455" width="100" height="20" class="button"/>
  <rect x="280" y="450" width="50" height="40" class="component"/>
  
  <!-- 表单区域 -->
  <rect x="20" y="510" width="335" height="50" class="component" rx="4"/>
  <text x="35" y="540" class="label">文本输入框</text>
  
  <rect x="20" y="575" width="335" height="50" class="button"/>
  <text x="187" y="605" class="text" text-anchor="middle">主按钮</text>
  
  <!-- 页面标注 -->
  <text x="187" y="700" class="label" text-anchor="middle">→ 交互箭头和说明写在旁边</text>
  
</svg>
